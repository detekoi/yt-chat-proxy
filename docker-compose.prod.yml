services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - proxy

  proxy:
    build: .
    restart: unless-stopped
    environment:
      - PORT=8080
    expose:
      - "8080"

volumes:
  caddy_data:
  caddy_config:
